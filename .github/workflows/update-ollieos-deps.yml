name: Update OllieOS Dependencies

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ollieos_updated]

permissions:
  contents: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Update
        run: |
          npm install
          npm run update-ollieos-deps

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto-update ollieos dependencies" || echo "No changes to commit"
          git push
